apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * Hermes: controllato da android/gradle.properties
 * hermesEnabled=true  -> Hermes ON
 * hermesEnabled=false -> JSC ON
 */
def hermesEnabled = (project.findProperty("hermesEnabled") ?: "false").toBoolean()

/**
 * Configurazione React Native per l'app Android.
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Proguard solo sulle build release (per ora disattivato).
 */
def enableProguardInReleaseBuilds = false

/**
 * Motore JavaScript alternativo: JSC (usato solo se Hermes è OFF)
 */
def jscFlavor = "org.webkit:android-jsc:+"

/**
 * --------------------------------------------------
 * Caricamento credenziali firma RELEASE
 * --------------------------------------------------
 */
def keystoreProperties = new java.util.Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new java.io.FileInputStream(keystorePropertiesFile))
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.voiceguideairlinkbare"

    defaultConfig {
        applicationId "com.voiceguideairlinkbare"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 12
        versionName "1.0.11"

        // 🔽 solo ARM64 (ok per Hermes + requisito 16 KB)
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }

        release {
            def sf = keystoreProperties["storeFile"] ?: System.getenv("ANDROID_KEYSTORE_FILE")
            def sp = keystoreProperties["storePassword"] ?: System.getenv("ANDROID_KEYSTORE_PASSWORD")
            def ka = keystoreProperties["keyAlias"] ?: System.getenv("ANDROID_KEY_ALIAS")
            def kp = keystoreProperties["keyPassword"] ?: System.getenv("ANDROID_KEY_PASSWORD")

            if (sf && sp && ka && kp) {
                storeFile rootProject.file(sf)
                storePassword sp
                keyAlias ka
                keyPassword kp
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".dev"
            signingConfig signingConfigs.debug
        }

        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    // ✅ Hermes correttamente incluso quando attivo
    if (hermesEnabled) {
        implementation("com.facebook.react:hermes-android")
    } else {
        // ✅ JSC usato solo se Hermes è OFF
        implementation jscFlavor
    }
}
